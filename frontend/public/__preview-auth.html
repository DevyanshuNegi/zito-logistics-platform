<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Zito Preview Auth</title>
  </head>
  <body>
    <script>
      const params = new URLSearchParams(window.location.search);
      const accessToken = params.get('accessToken');
      const refreshToken = params.get('refreshToken');
      const user = params.get('user');
      const nextPath = params.get('next') || '/customer/bookings';

      if (accessToken && user) {
        window.localStorage.setItem('zito.accessToken', accessToken);
        if (refreshToken) {
          window.localStorage.setItem('zito.refreshToken', refreshToken);
        } else {
          window.localStorage.removeItem('zito.refreshToken');
        }
        window.localStorage.setItem('zito.user', user);
      }

      window.location.replace(nextPath);
    </script>
  </body>
</html>
