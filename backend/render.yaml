services:
  # Backend API
  - type: web
    name: zito-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health

    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000

      # Database (auto-linked)
      - key: DATABASE_URL
        fromDatabase:
          name: zito-db
          property: connectionString

      # Redis (auto-linked)
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: zito-redis
          property: connectionString

      # JWT
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

      # CORS
      - key: CORS_ORIGIN
        value: https://zito-frontend.onrender.com

  # Frontend
  - type: web
    name: zito-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://zito-backend.onrender.com

  # Redis / Key Value
  - type: keyvalue
    name: zito-redis
    plan: free
    ipAllowList: []

databases:
  - name: zito-db
    plan: free
