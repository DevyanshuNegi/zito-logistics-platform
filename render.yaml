services:
  # Backend API
  - type: web
    name: zito-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/v1/health

    envVars:
      - key: NODE_ENV
        value: production

      - key: PORT
        value: 10000

      # Database (Render auto connection string)
      - key: DATABASE_URL
        fromDatabase:
          name: zito-db
          property: connectionString

      # JWT Configuration
      - key: JWT_SECRET
        generateValue: true

      - key: JWT_REFRESH_SECRET
        generateValue: true

      - key: JWT_EXPIRES_IN
        value: 30d

      # CORS
      - key: CORS_ORIGIN
        value: https://zito-frontend.onrender.com


  # Frontend Static Site
  - type: web
    name: zito-frontend
    runtime: static
    plan: free
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist

    envVars:
      - key: VITE_API_URL
        value: https://zito-backend.onrender.com


databases:
  - name: zito-db
    plan: free