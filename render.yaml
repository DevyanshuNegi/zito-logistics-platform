services:
  - type: web
    name: zito-backend
    runtime: node
    plan: free
    region: oregon
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy && npm run build
    startCommand: npm run start:prod
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: DATABASE_URL
        fromDatabase:
          name: zito-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: zito-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://zito-frontend.onrender.com
      - key: BULLMQ_ENABLED
        value: "true"
      - key: BULLMQ_QUEUE_NAME
        value: zito-jobs
      - key: BULLMQ_DEAD_LETTER_QUEUE
        value: zito-dead-letter
      - key: MAIL_FROM
        value: no-reply@aurenza.local

  - type: web
    name: zito-frontend
    runtime: node
    plan: free
    region: oregon
    rootDir: frontend
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: NEXT_PUBLIC_API_URL
        value: https://zito-backend.onrender.com/api/v1

  - type: keyvalue
    name: zito-redis
    plan: free
    region: oregon
    ipAllowList: []

databases:
  - name: zito-db
    plan: free
    region: oregon
