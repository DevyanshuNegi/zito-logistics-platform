version: '3.8'

services:
  # Database Service
  postgres:
    image: postgres:15-alpine
    container_name: zito-postgres
    restart: always
    environment:
      POSTGRES_USER: zito_user
      POSTGRES_PASSWORD: zito_secure_password
      POSTGRES_DB: zito_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zito_user -d zito_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Cache & Queue Service
  redis:
    image: redis:7-alpine
    container_name: zito-redis
    restart: always
    command: redis-server --save 60 1 --loglevel warning
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: zito-backend
    restart: always
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://zito_user:zito_secure_password@postgres:5432/zito_db?schema=public
      REDIS_URL: redis://redis:6379
      JWT_SECRET: prod_fallback_jwt_secret_please_change
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:3003
    ports:
      - "5000:5000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  # Next.js Web Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: zito-frontend
    restart: always
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
